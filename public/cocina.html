<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Cocina - Tiempo Real</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-dark text-white">
  <!-- Header -->
  <nav class="navbar navbar-dark bg-danger mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">🍳 Dashboard de Cocina (Tiempo Real)</span>
      <span class="text-white fw-bold" id="userDisplay">Cocinero</span>
    </div>
  </nav>

  <div class="container">
    <h3 class="fw-bold mb-4">Comandas Entrantes</h3>
    
    <div id="gridPedidos" class="row">
      <!-- Las tarjetas de pedidos dinámicos aparecerán aquí en tiempo real -->
    </div>
  </div>

  <script>
    const socket = io();
    const cocineroNombre = localStorage.getItem('usuarioNombre') || 'Cocinero Principal';
    document.getElementById('userDisplay').innerText = `Chef: ${cocineroNombre}`;

    // Cargar pedidos al inicio
    refrescarPedidos();

    // ESCUCHAR CUANDO UN MOZO ENVÍA UN PEDIDO EN VIVO
    socket.on('recibir-pedido', (pedido) => {
      refrescarPedidos();
    });

    // ESCUCHAR CAMBIOS DE ESTADO DE CUALQUIER PEDIDO
    socket.on('estado-actualizado', () => {
      refrescarPedidos();
    });

    function refrescarPedidos() {
      fetch('/api/pedidos')
        .then(res => res.json())
        .then(pedidos => renderizarPedidos(pedidos));
    }

    function cambiarEstado(pedidoId, nuevoEstado) {
      // Emitir cambio de estado a través de WebSockets
      socket.emit('cambiar-estado', { pedidoId, nuevoEstado });
    }

    function renderizarPedidos(pedidos) {
      const container = document.getElementById('gridPedidos');
      container.innerHTML = '';

      if (pedidos.length === 0) {
        container.innerHTML = '<div class="col-12"><p class="text-muted fs-5">No hay comandas pendientes en este momento.</p></div>';
        return;
      }

      pedidos.forEach(p => {
        let borderClass = 'border-warning';
        if (p.estado === 'En Preparación') borderClass = 'border-info';
        if (p.estado === 'Listo para Servir') borderClass = 'border-success opacity-50';

        let listaPlatosHTML = p.platos.map(plato => `<li class="list-group-item bg-dark text-white border-secondary">📌 ${plato}</li>`).join('');

        container.innerHTML += `
          <div class="col-md-4 mb-4">
            <div class="card bg-secondary text-white border-3 ${borderClass} shadow-lg h-100">
              <div class="card-header d-flex justify-content-between align-items-center bg-dark">
                <h4 class="fw-bold mb-0 text-warning">${p.mesa}</h4>
                <span class="badge bg-light text-dark fw-bold">${p.estado}</span>
              </div>
              <div class="card-body">
                <p class="mb-1 text-light"><strong>Mozo:</strong> ${p.mozoNombre}</p>
                <h6 class="fw-bold mt-3">Platos a preparar:</h6>
                <ul class="list-group mb-3">
                  ${listaPlatosHTML}
                </ul>
              </div>
              <div class="card-footer bg-dark d-flex justify-content-between gap-2">
                <button class="btn btn-info btn-sm w-50 fw-bold" onclick="cambiarEstado('${p._id}', 'En Preparación')">
                  👨‍🍳 Preparar
                </button>
                <button class="btn btn-success btn-sm w-50 fw-bold" onclick="cambiarEstado('${p._id}', 'Listo para Servir')">
                  ✅ Listo
                </button>
              </div>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
